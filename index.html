<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#faf7f2">
  <title>Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-pattern"></div>

  <main>
    <div class="controls-top">
      <p class="card-counter" id="card-counter">1 / 53</p>
      <button id="shuffle-btn" class="btn-icon" title="Shuffle deck">🔀</button>
    </div>

    <div class="card-scene" id="card-scene">
      <div class="card" id="card">
        <div class="card-face card-front">
          <span class="label">Macedonian</span>
          <p class="word" id="word-mk">—</p>
          <p class="hint">tap to reveal</p>
        </div>
        <div class="card-face card-back">
          <span class="label">English</span>
          <p class="word" id="word-en">—</p>
          <p class="phonetic" id="phonetic"></p>
        </div>
      </div>
    </div>

    <div class="nav-buttons">
      <button id="prev-btn" class="btn btn-secondary">← Previous</button>
      <button id="know-btn" class="btn btn-success">Got it ✓</button>
      <button id="next-btn" class="btn btn-primary">Next →</button>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="known-count">0</span>
        <span class="stat-label">Learned</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="remaining-count">0</span>
        <span class="stat-label">Remaining</span>
      </div>
    </div>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
